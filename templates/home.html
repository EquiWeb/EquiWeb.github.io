<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EquiWeb</title>
  <link rel="icon" type="image/svg+xml" href="/EquiWeb-Logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="home">

  <header class="site-header">
    <div>EquiWeb / 2026</div>
    <div>Empowering&nbsp;Accessible&nbsp;Web&nbsp;Experiences&nbsp;for&nbsp;All</div>
  </header>

  <main class="hero">
    <img src="/equiweb-logo.png" alt="EquiWeb logo" class="hero-logo">
    <h1 class="brand-title">EquiWeb</h1>
    <p class="tagline">{{ .Content }}</p>
  </main>

  <footer class="site-footer">
    <nav class="nav-grid">
      <div class="grid-section">
        <span class="label">About</span>
        <p class="grid-body">A personal startup and research lab building tools for agents, developers, and infrastructure.</p>
      </div>
      <div class="grid-section">
        <span class="label">Menu</span>
        <a href="/index.html" class="nav-link">Home</a>
        <a href="/products.html" class="nav-link">Products</a>
        <a href="/blog.html" class="nav-link">Blog</a>
      </div>
      <div class="grid-section">
        <span class="label">Projects</span>
        <a href="/products.html#equiforge" class="nav-link">EquiForge</a>
        <a href="/products.html#equicode" class="nav-link">EquiCode</a>
        <a href="/products.html#equidrive" class="nav-link">EquiDrive</a>
        <a href="/products.html#mimir-aip" class="nav-link">Mimir AIP</a>
      </div>
      <div class="grid-section grid-right">
        <span class="label">Location</span>
        <span class="grid-body">Belfast, NI</span>
      </div>
    </nav>
  </footer>

</body>
</html>
